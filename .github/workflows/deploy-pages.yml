name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build publish folder
        run: |
          mkdir -p _site/conteudo
          cp index.html _site/index.html
          cp styles.css _site/styles.css
          cp script.js _site/script.js
          cp course-data.js _site/course-data.js
          cp 404.html _site/404.html
          cp .nojekyll _site/.nojekyll
          cp conteudo/curso-eletronica.md _site/conteudo/curso-eletronica.md

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
