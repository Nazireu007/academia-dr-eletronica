<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página não encontrada | Academia DR</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: #eef6ff;
        background:
          radial-gradient(circle at top left, rgba(255, 108, 47, 0.18), transparent 24%),
          radial-gradient(circle at top right, rgba(123, 226, 200, 0.14), transparent 28%),
          linear-gradient(180deg, #050d14 0%, #09131c 40%, #071018 100%);
      }

      .card {
        width: min(100%, 720px);
        border: 1px solid rgba(144, 172, 198, 0.18);
        border-radius: 1.6rem;
        padding: 2rem;
        background: rgba(14, 24, 36, 0.92);
        box-shadow: 0 26px 80px rgba(0, 0, 0, 0.34);
      }

      .eyebrow {
        margin: 0 0 0.8rem;
        color: #7be2c8;
        font-size: 0.74rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.2rem, 6vw, 4rem);
        line-height: 1.02;
      }

      p {
        color: #92abc1;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 0.8rem;
        padding: 0.95rem 1.3rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 800;
        color: #221308;
        background: linear-gradient(135deg, #ff6c2f, #ffb067);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Academia DR</p>
      <h1>Essa página não foi encontrada.</h1>
      <p>
        O link pode ter mudado ou estar incompleto. Volte para a página principal
        do curso para continuar navegando normalmente.
      </p>
      <a href="./index.html">Voltar para o curso</a>
    </main>
  </body>
</html>
